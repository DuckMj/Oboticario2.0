name: Executar Alertas Ntfy de Vencimento

on:
  schedule:
    # Executa todos os dias às 08:00 do horário de Brasília (11:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch: # Permite-te executar o script manualmente pelo painel do GitHub

jobs:
  verificar-prazos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Dependências
        run: |
          npm init -y
          npm install firebase

      - name: Executar Script de Alertas
        run: node ntfy-cron.js
